<div class="page-container">
  <div class="page-header">
    <h1>Roles</h1>
    <button mat-raised-button color="primary" (click)="openCreateForm()">
      <mat-icon>add</mat-icon>
      Crear Rol
    </button>
  </div>

  <!-- Formulario Crear Rol -->
  <mat-card class="form-card" *ngIf="showCreateForm">
    <mat-card-header>
      <mat-card-title>{{ isEditing ? 'Editar Rol' : 'Crear Rol' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Nombre</mat-label>
          <input matInput [(ngModel)]="newRole.name">
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Guard</mat-label>
          <input matInput [(ngModel)]="newRole.guardName">
        </mat-form-field>
      </div>

      <h3>Recursos</h3>
      <mat-accordion>
        <mat-expansion-panel *ngFor="let resource of resources">
          <mat-expansion-panel-header>
            <mat-panel-title>{{ resource.name }}</mat-panel-title>
          </mat-expansion-panel-header>

          <div class="permissions-list">
            <mat-checkbox class="select-all">Seleccionar todos</mat-checkbox>
            <mat-checkbox *ngFor="let perm of resource.permissions"
                          (change)="togglePermission(resource.id, perm, $event)">
              {{ perm }}
            </mat-checkbox>
          </div>
        </mat-expansion-panel>
      </mat-accordion>

      <div class="form-actions">
        <button mat-button (click)="closeCreateForm()">Cancelar</button>
        <button mat-raised-button color="primary" (click)="createRole()">{{ isEditing ? 'Actualizar' : 'Crear' }}</button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Lista de roles -->
  <mat-card class="table-card">
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width mb-20">
        <mat-label>Buscar</mat-label>
        <input matInput [(ngModel)]="searchTerm" placeholder="Buscar rol...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <table mat-table [dataSource]="filteredRoles" class="full-width">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Nombre </th>
          <td mat-cell *matCellDef="let r"> {{ r.name }} </td>
        </ng-container>

        <ng-container matColumnDef="guard">
          <th mat-header-cell *matHeaderCellDef> Guard </th>
          <td mat-cell *matCellDef="let r"> {{ r.guardName }} </td>
        </ng-container>

        <ng-container matColumnDef="updatedAt">
          <th mat-header-cell *matHeaderCellDef> Actualizado el </th>
          <td mat-cell *matCellDef="let r"> {{ r.updatedAt }} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let r">
            <button mat-icon-button color="primary" (click)="editRole(r)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteRole(r.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
