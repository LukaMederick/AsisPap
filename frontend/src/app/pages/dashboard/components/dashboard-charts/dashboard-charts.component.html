<div class="charts-container">
  <!-- Chart 1: Estadística Semanal -->
  <mat-card class="chart-card">
    <mat-card-header>
      <div mat-card-avatar class="header-icon">
        <i class="material-icons">bar_chart</i>
      </div>
      <mat-card-title>Asistencia Semanal</mat-card-title>
      <mat-card-subtitle>Resumen de los últimos 5 días</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas #weeklyChart></canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="secondary-charts">
    <!-- Chart 2: Asistencias por Oficina -->
    <mat-card class="chart-card">
      <mat-card-header>
        <div mat-card-avatar class="header-icon">
          <i class="material-icons">pie_chart</i>
        </div>
        <mat-card-title>Asistencias por Oficina</mat-card-title>
        <mat-card-subtitle>Distribución actual</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper doughnut-wrapper">
          <canvas #officeChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Chart 3: Papeletas Aprobadas -->
    <mat-card class="chart-card">
      <mat-card-header>
        <div mat-card-avatar class="header-icon">
          <i class="material-icons">trending_up</i>
        </div>
        <mat-card-title>Papeletas Aprobadas</mat-card-title>
        <mat-card-subtitle>Últimos meses</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas #requestsChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
