<div class="page-container">
  <div class="page-header">
    <h1>Papeletas</h1>
    <button mat-raised-button color="primary" routerLink="/permissions/create">
      <mat-icon>add</mat-icon>
      Crear papeleta
    </button>
  </div>

  <div class="stats-row">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-value">{{ totalPermissions }}</div>
        <div class="stat-label">Total papeletas</div>
      </mat-card-content>
    </mat-card>
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-value">{{ totalRegistered }}</div>
        <div class="stat-label">Total de papeletas registradas</div>
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card class="table-card">
    <mat-card-content>
      <div class="table-container">
        <table mat-table [dataSource]="permissions">

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let p"> {{ p.id }} </td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Tipo de papeleta </th>
            <td mat-cell *matCellDef="let p"> {{ p.type }} </td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Descripción </th>
            <td mat-cell *matCellDef="let p"> {{ p.description }} </td>
          </ng-container>

          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Fecha </th>
            <td mat-cell *matCellDef="let p"> {{ p.date }} <br> {{ p.startTime }} - {{ p.endTime }} </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let p">
              <mat-chip [color]="getStatusColor(p.status)" highlighted>
                {{ p.status }}
              </mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> </th>
            <td mat-cell *matCellDef="let p">
              <button mat-icon-button color="primary" (click)="printPermission(p.id)">
                <mat-icon>print</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
