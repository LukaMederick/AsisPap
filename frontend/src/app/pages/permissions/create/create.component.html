<div class="page-container">
  <div class="page-header">
    <h1>Crear Papeleta</h1>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-card-title>Datos de papeleta</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Tipo de papeleta</mat-label>
          <mat-select [(ngModel)]="selectedType" name="type" required>
            <mat-option *ngFor="let type of permissionTypes" [value]="type">
              {{ type }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Fecha</mat-label>
          <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate" name="date">
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Hora de salida</mat-label>
            <input matInput type="time" [(ngModel)]="startTime" name="startTime">
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Hora de retorno</mat-label>
            <input matInput type="time" [(ngModel)]="endTime" name="endTime">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descripción</mat-label>
          <textarea matInput rows="4" [(ngModel)]="description" name="description"></textarea>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/permissions/all">Cancelar</button>
          <button mat-raised-button color="primary" type="submit">Crear papeleta</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
