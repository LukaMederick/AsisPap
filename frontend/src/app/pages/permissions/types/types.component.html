<div class="page-container">
  <div class="page-header">
    <h1>Tipos de papeletas</h1>
  </div>

  <!-- Formulario para crear/editar tipo -->
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ isEditing ? 'Editar Tipo De Papeleta' : 'Crear Tipo De Papeleta' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Nombre</mat-label>
          <input matInput [(ngModel)]="newType.name" placeholder="Ej. ASUNTOS PARTICULARES">
        </mat-form-field>

        <mat-form-field appearance="outline" class="quarter-width">
          <mat-label>Color</mat-label>
          <input matInput type="color" [(ngModel)]="newType.color">
        </mat-form-field>

        <mat-form-field appearance="outline" class="quarter-width">
          <mat-label>Icono</mat-label>
          <mat-select [(ngModel)]="newType.icon">
            <mat-option *ngFor="let icon of availableIcons" [value]="icon">
              <mat-icon>{{ icon }}</mat-icon> {{ icon }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-button color="warn" (click)="resetForm()">
          Cancelar
        </button>
        <button mat-raised-button color="primary" (click)="addType()">
          {{ isEditing ? 'Actualizar' : 'Crear' }}
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Tabla de tipos existentes -->
  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title>Lista de tipos</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="permissionTypes" class="full-width">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Nombre </th>
          <td mat-cell *matCellDef="let t"> {{ t.name }} </td>
        </ng-container>

        <ng-container matColumnDef="color">
          <th mat-header-cell *matHeaderCellDef> Color </th>
          <td mat-cell *matCellDef="let t">
            <div class="color-preview" [style.backgroundColor]="t.color"></div>
          </td>
        </ng-container>

        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef> Icono </th>
          <td mat-cell *matCellDef="let t">
            <mat-icon [style.color]="t.color">{{ t.icon }}</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let t">
            <mat-slide-toggle [checked]="t.status" (change)="toggleStatus(t)">
              {{ t.status ? 'Habilitado' : 'Deshabilitado' }}
            </mat-slide-toggle>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let t">
            <button mat-icon-button color="primary" (click)="editType(t)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteType(t.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
