<div class="page-container">
  <div class="page-header">
    <h1>Registro de asistencia</h1>
  </div>

  <!-- Error de ubicación -->
  <mat-card class="error-card" *ngIf="locationError">
    <mat-card-content>
      <div class="error-content">
        <mat-icon color="warn">location_off</mat-icon>
        <h3>Error de ubicación</h3>
        <p>Permiso de ubicación denegado.</p>
        <button mat-raised-button color="primary" (click)="retryLocation()">
          Retornar
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Registrar Asistencia -->
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Registrar Asistencia</mat-card-title>
      <mat-card-subtitle>Complete el formulario para registrar una asistencia</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Trabajador</mat-label>
        <mat-select [(ngModel)]="selectedWorker">
          <mat-option *ngFor="let worker of workers" [value]="worker">
            {{ worker }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Fecha y Hora</mat-label>
        <input matInput [value]="currentDateTime" disabled>
      </mat-form-field>

      <div class="radio-group">
        <label class="radio-label">Tipo de marcado</label>
        <mat-radio-group [(ngModel)]="markType">
          <mat-radio-button *ngFor="let type of markTypes" [value]="type">
            {{ type }}
          </mat-radio-button>
        </mat-radio-group>
      </div>

      <div class="form-actions">
        <button mat-button color="warn">Cancelar</button>
        <button mat-raised-button color="primary" (click)="registerAttendance()">
          Confirmar
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Últimas marcaciones -->
  <mat-card class="history-card">
    <mat-card-header>
      <mat-card-title>Últimas marcaciones</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="lastMarks" class="full-width">
        <ng-container matColumnDef="datetime">
          <th mat-header-cell *matHeaderCellDef> Fecha y hora </th>
          <td mat-cell *matCellDef="let m"> {{ m.datetime }} </td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef> Tipo </th>
          <td mat-cell *matCellDef="let m">
            <mat-chip [color]="m.type === 'Entrada' ? 'primary' : 'warn'" highlighted>
              {{ m.type }}
            </mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
